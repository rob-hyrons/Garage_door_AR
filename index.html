<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Roller Shutter Configurator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f4f4f4; }
        
        /* Input Panel: Always visible at the top */
        .controls { 
            background: #ffffff; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;
        }
        
        /* Model Viewer: Fixed height so it doesn't push inputs off screen */
        #viewer-container { width: 100%; height: 60vh; background: #2c313c; position: relative; }
        model-viewer { width: 100%; height: 100%; }

        /* AR Button */
        #ar-button {
            position: absolute; bottom: 20px; right: 20px;
            padding: 12px 20px; background: #fff; border-radius: 20px;
            border: 1px solid #ccc; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Inputs at the top -->
    <div class="controls">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <label>W (mm): <input type="number" id="width" value="2000" style="width:70px"></label>
            <label>H (mm): <input type="number" id="height" value="2000" style="width:70px"></label>
        </div>
        <label>Colour: <input type="color" id="colorPicker" value="#d4d4d4"></label>
        <label>Mode: 
            <select id="mode">
                <option value="external">External (Box & Guides)</option>
                <option value="internal">Internal (Curtain Only)</option>
            </select>
        </label>
        <button class="btn-update" id="generate-btn" onclick="generateModel()">Update & Regenerate</button>
    </div>

    <!-- Viewer below inputs -->
    <div id="viewer-container">
        <model-viewer id="shutter-viewer" 
                      camera-controls auto-rotate shadow-intensity="1.5" 
                      ar ar-modes="webxr scene-viewer quick-look"
                      ar-scale="fixed" ar-placement="floor"
                      alt="Roller Shutter">
            <button slot="ar-button" id="ar-button">View in AR</button>
        </model-viewer>
    </div>

    <script>
        // (Functionality remains exactly as before to ensure file generation stability)
        function generateModel() {
            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            setTimeout(() => {
                const w = (parseInt(document.getElementById('width').value) || 2000) / 1000;
                const requestedH = (parseInt(document.getElementById('height').value) || 2000) / 1000;
                const mode = document.getElementById('mode').value;
                const color = document.getElementById('colorPicker').value;

                const scene = new THREE.Scene();
                const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5, metalness: 0.1, side: THREE.DoubleSide });

                const bh = 0.077;
                const numBlades = Math.max(1, Math.floor(requestedH / bh));
                const actualH = numBlades * bh; 

                const shape = new THREE.Shape();
                shape.moveTo(0, 0); 
                shape.quadraticCurveTo(0.005, bh / 2, 0, bh); 
                shape.lineTo(-0.018, bh); 
                shape.quadraticCurveTo(-0.013, bh / 2, -0.018, 0); 
                shape.lineTo(0, 0); 

                const geometry = new THREE.ExtrudeGeometry(shape, { depth: w, bevelEnabled: false });

                for(let i = 0; i < numBlades; i++) {
                    const blade = new THREE.Mesh(geometry, material);
                    blade.rotation.y = -Math.PI / 2; 
                    blade.position.set(w / 2, i * bh, 0);
                    scene.add(blade);
                }

                if (mode === 'external') {
                    const gGeo = new THREE.BoxGeometry(0.060, actualH, 0.055);
                    const leftGuide = new THREE.Mesh(gGeo, material);
                    leftGuide.position.set(-w / 2 - 0.030, actualH / 2, -0.0065); 
                    scene.add(leftGuide);
                    const rightGuide = new THREE.Mesh(gGeo, material);
                    rightGuide.position.set(w / 2 + 0.030, actualH / 2, -0.0065);
                    scene.add(rightGuide);
                    const box = new THREE.Mesh(new THREE.BoxGeometry(w + 0.120, 0.250, 0.300), material);
                    box.position.set(0, actualH + 0.125, -0.150);
                    scene.add(box);
                }

                const exporter = new THREE.GLTFExporter();
                exporter.parse(scene, (gltf) => {
                    const blob = new Blob([gltf], { type: 'model/gltf-binary' });
                    const viewer = document.getElementById('shutter-viewer');
                    viewer.src = URL.createObjectURL(blob);
                    btn.disabled = false;
                    btn.innerText = "Update & Regenerate";
                }, { binary: true });
            }, 50); 
        }
        window.addEventListener('DOMContentLoaded', generateModel);
    </script>
</body>
</html>
