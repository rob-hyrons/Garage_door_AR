<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Roller Shutter Configurator</title>
    
    <!-- Permanently fixes the iOS Pinch-to-Zoom bug -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for Mouse/Touch interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- GLTFExporter to package the model for AR -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    <!-- Google Model Viewer for AR display -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #2c313c; overflow: hidden; touch-action: none; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        .controls { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; width: 90%; max-width: 750px;
        }
        input, select, button { padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; outline: none; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #888; cursor: not-allowed; }
        
        #ar-button { background: #28a745; }
        #ar-button:hover:not(:disabled) { background: #1e7e34; }
        
        /* Hidden AR Engine - Uses opacity instead of 'display:none' so the browser doesn't block it */
        #ar-viewer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 10px; height: 10px; 
            opacity: 0.001; 
            pointer-events: none; 
            z-index: -1; 
        }
    </style>
</head>
<body>

    <div class="controls">
        <label>Width: <input type="number" id="width" value="2000" style="width:70px"> mm</label>
        <label>Height: <input type="number" id="height" value="2000" style="width:70px"> mm</label>
        <label>Colour: <input type="color" id="colorPicker" value="#f4f4f4"></label>
        <label>Mode: 
            <select id="mode">
                <option value="external">External (Guides & Box visible)</option>
                <option value="internal">Internal (Curtain only)</option>
            </select>
        </label>
        <button onclick="updateShutter()">Update Model</button>
        <button id="ar-button" onclick="launchAR()" disabled>Loading AR...</button>
    </div>

    <!-- Hidden AR Engine - 'loading="eager"' forces iOS/Android to process it immediately -->
    <model-viewer id="ar-viewer" ar ar-modes="webxr scene-viewer quick-look" loading="eager"></model-viewer>

    <div id="viewer"></div>

    <script>
        // --- 1. Scene Setup ---
        const viewer = document.getElementById('viewer');
        const scene = new THREE.Scene();
        
        const initialAspect = (viewer.clientWidth || window.innerWidth) / (viewer.clientHeight || window.innerHeight);
        const camera = new THREE.PerspectiveCamera(45, initialAspect, 1, 30000);
        
        const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(viewer.clientWidth || window.innerWidth, viewer.clientHeight || window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); 
        viewer.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(1000, 2000, 3000);
        scene.add(directionalLight);

        let shutterGroup = new THREE.Group();
        scene.add(shutterGroup);

        // --- 2. Generation Logic ---
        function updateShutter() {
            while(shutterGroup.children.length > 0){ 
                shutterGroup.remove(shutterGroup.children[0]); 
            }
            
            const width = parseInt(document.getElementById('width').value) || 2000;
            const requestedHeight = parseInt(document.getElementById('height').value) || 2000;
            const color = document.getElementById('colorPicker').value;
            const mode = document.getElementById('mode').value;
            
            const bladeHeight = 77;
            const numBlades = Math.max(1, Math.floor(requestedHeight / bladeHeight));
            const actualHeight = numBlades * bladeHeight; 

            const material = new THREE.MeshPhongMaterial({ 
                color: color, 
                shininess: 40,
                side: THREE.DoubleSide 
            });

            // A. Create the 18mm Thick Curved Blade Profile
            const shape = new THREE.Shape();
            shape.moveTo(0, 0); 
            shape.quadraticCurveTo(5, bladeHeight / 2, 0, bladeHeight); 
            shape.lineTo(-18, bladeHeight); 
            shape.quadraticCurveTo(-13, bladeHeight / 2, -18, 0); 
            shape.lineTo(0, 0); 

            const extrudeSettings = { depth: width, bevelEnabled: false };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);

            // Generate the Curtain
            for(let i = 0; i < numBlades; i++) {
                const blade = new THREE.Mesh(geometry, material);
                blade.rotation.y = -Math.PI / 2; 
                blade.position.set(width / 2, i * bladeHeight, 0);
                shutterGroup.add(blade);
            }

            // B. Generate Side Guides and Top Box (ONLY if External mode)
            if (mode === 'external') {
                const guideWidth = 60;
                const guideDepth = 55; 
                const guideGeo = new THREE.BoxGeometry(guideWidth, actualHeight, guideDepth);
                
                const guideCenterZ = -6.5; 

                const leftGuide = new THREE.Mesh(guideGeo, material);
                leftGuide.position.set(-width / 2 - guideWidth / 2, actualHeight / 2, guideCenterZ); 
                shutterGroup.add(leftGuide);

                const rightGuide = new THREE.Mesh(guideGeo, material);
                rightGuide.position.set(width / 2 + guideWidth / 2, actualHeight / 2, guideCenterZ);
                shutterGroup.add(rightGuide);

                // Top Box
                const boxWidth = width + (guideWidth * 2); 
                const boxHeight = 250;
                const boxDepth = 300; 
                const boxGeo = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
                const box = new THREE.Mesh(boxGeo, material);
                
                const boxY = actualHeight + (boxHeight / 2);
                
                const guideFrontZ = guideCenterZ + (guideDepth / 2); 
                const boxZ = guideFrontZ - (boxDepth / 2); 
                
                box.position.set(0, boxY, boxZ);
                shutterGroup.add(box);
            }

            // D. Smart Camera Framing
            const aspect = camera.aspect;
            const fovRad = camera.fov * (Math.PI / 180);
            let cameraZ = (actualHeight / 2) / Math.tan(fovRad / 2);
            if (aspect < 1) { 
                cameraZ = Math.max(cameraZ, (width / 2) / Math.tan(fovRad / 2) / aspect);
            }
            camera.position.set(0, actualHeight / 2, cameraZ * 1.3); 
            controls.target.set(0, actualHeight / 2, 0);
            controls.update();

            // Silently generate the new AR file in the background
            generateAR();
        }

        // --- 3. Animation & Resizing ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 4. Synchronous AR Engine Fix ---
        function generateAR() {
            const btn = document.getElementById('ar-button');
            btn.innerText = "Processing AR...";
            btn.disabled = true;

            const exporter = new THREE.GLTFExporter();
            
            // Short timeout so the browser doesn't freeze the screen UI visually
            setTimeout(() => {
                exporter.parse(shutterGroup, function (gltf) {
                    if (window.blobUrl) URL.revokeObjectURL(window.blobUrl);

                    const blob = new Blob([gltf], { type:
