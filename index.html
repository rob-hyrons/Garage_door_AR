<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Roller Shutter Configurator</title>
    <!-- Fixes iOS mobile pinch zooming layout breaks -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Three.js (Background Math & Exporter Engine) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    
    <!-- Google Model Viewer (Latest Version) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c313c; 
            height: 100vh; 
            display: flex; flex-direction: column; 
        }
        
        #viewer-container {
            flex-grow: 1; 
            width: 100%;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #2c313c;
            --poster-color: transparent;
        }

        /* OFFICIAL AR BUTTON STYLING FROM MODELVIEWER.DEV */
        #ar-button {
            background-image: url('https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.png');
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            top: 20px;
            right: 20px;
            white-space: nowrap;
            padding: 0px 16px 0px 40px;
            font-family: Roboto Regular, Helvetica Neue, sans-serif;
            font-size: 14px;
            color: #4285f4;
            height: 36px;
            line-height: 36px;
            border-radius: 18px;
            border: 1px solid #DADCE0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.2s;
        }

        #ar-button:active { background-color: #E8EAED; }
        #ar-button:focus { outline: none; }
        #ar-button:focus-visible { outline: 1px solid #4285f4; }

        /* Bottom Control Panel */
        .controls { 
            background: #ffffff; padding: 20px; 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2); z-index: 10;
        }
        
        .controls label { font-weight: bold; font-size: 14px; color: #444; }
        input, select, button { 
            padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px; 
            font-size: 14px; outline: none; background: #fff;
        }
        input[type="number"] { width: 70px; }
        
        .btn-update { 
            background: #007bff; color: white; border: none; 
            cursor: pointer; font-weight: bold; padding: 10px 20px; transition: 0.2s;
        }
        .btn-update:hover:not(:disabled) { background: #0056b3; }
        .btn-update:disabled { background: #888; cursor: wait; }
        
    </style>
</head>
<body>

    <div id="viewer-container">
        <!-- 
            ar-scale="fixed" forces it to stay the EXACT real world millimeters 
            ar-modes includes quick-look for iOS and scene-viewer for Android
        -->
        <model-viewer id="shutter-viewer" 
                      camera-controls 
                      auto-rotate 
                      shadow-intensity="1.5" 
                      shadow-softness="0.5"
                      exposure="1.2"
                      ar 
                      ar-modes="webxr scene-viewer quick-look"
                      ar-scale="fixed"
                      alt="3D Roller Shutter Configuration">
            
            <!-- OFFICIAL SLOT AR BUTTON -->
            <button slot="ar-button" id="ar-button">
                View in your space
            </button>
            
        </model-viewer>
    </div>

    <div class="controls">
        <label>Width: <input type="number" id="width" value="2000"> mm</label>
        <label>Height: <input type="number" id="height" value="2000"> mm</label>
        <label>Colour: <input type="color" id="colorPicker" value="#d4d4d4"></label>
        <label>Mode: 
            <select id="mode">
                <option value="external">External (Box & Guides)</option>
                <option value="internal">Internal (Curtain Only)</option>
            </select>
        </label>
        <button class="btn-update" id="generate-btn" onclick="generateModel()">Update Model</button>
    </div>

    <script>
        function generateModel() {
            const btn = document.getElementById('generate-btn');
            const originalText = btn.innerText;
            
            btn.innerText = "Generating...";
            btn.disabled = true;

            setTimeout(() => {
                // Convert Millimeters to standard AR Meters
                const w = (parseInt(document.getElementById('width').value) || 2000) / 1000;
                const requestedH = (parseInt(document.getElementById('height').value) || 2000) / 1000;
                const mode = document.getElementById('mode').value;
                const color = document.getElementById('colorPicker').value;

                const scene = new THREE.Scene();
                
                const material = new THREE.MeshStandardMaterial({ 
                    color: color, 
                    roughness: 0.5, 
                    metalness: 0.1,
                    side: THREE.DoubleSide 
                });

                const bh = 0.077; // 77mm blade
                const numBlades = Math.max(1, Math.floor(requestedH / bh));
                const actualH = numBlades * bh; 

                // 18mm curved blade profile
                const shape = new THREE.Shape();
                shape.moveTo(0, 0); 
                shape.quadraticCurveTo(0.005, bh / 2, 0, bh); 
                shape.lineTo(-0.018, bh); 
                shape.quadraticCurveTo(-0.013, bh / 2, -0.018, 0); 
                shape.lineTo(0, 0); 

                const geometry = new THREE.ExtrudeGeometry(shape, { depth: w, bevelEnabled: false });

                for(let i = 0; i < numBlades; i++) {
                    const blade = new THREE.Mesh(geometry, material);
                    blade.rotation.y = -Math.PI / 2; 
                    blade.position.set(w / 2, i * bh, 0);
                    scene.add(blade);
                }

                if (mode === 'external') {
                    const gWidth = 0.060;
                    const gDepth = 0.055; 
                    const gGeo = new THREE.BoxGeometry(gWidth, actualH, gDepth);
                    const gCenterZ = -0.0065; 

                    const leftGuide = new THREE.Mesh(gGeo, material);
                    leftGuide.position.set(-w / 2 - gWidth / 2, actualH / 2, gCenterZ); 
                    scene.add(leftGuide);

                    const rightGuide = new THREE.Mesh(gGeo, material);
                    rightGuide.position.set(w / 2 + gWidth / 2, actualH / 2, gCenterZ);
                    scene.add(rightGuide);

                    const bHeight = 0.250;
                    const bDepth = 0.300; 
                    const boxGeo = new THREE.BoxGeometry(w + (gWidth * 2), bHeight, bDepth);
                    const box = new THREE.Mesh(boxGeo, material);
                    
                    box.position.set(0, actualH + (bHeight / 2), gCenterZ + (gDepth / 2) - (bDepth / 2));
                    scene.add(box);
                }

                const exporter = new THREE.GLTFExporter();
                
                // CRITICAL FIX RESTORED: Exactly 3 arguments (Input, Success Callback, Options)
                // Passing a 4th argument here is what corrupted the binary blob and crashed the screen!
                exporter.parse(
                    scene, 
                    function ( gltf ) {
                        // Ensure we safely export as True Binary before passing to Model Viewer
                        if (gltf instanceof ArrayBuffer) {
                            const blob = new Blob([gltf], { type: 'model/gltf-binary' });
                            const url = URL.createObjectURL(blob);
                            
                            const viewer = document.getElementById('shutter-viewer');
                            
                            // Free up memory to prevent browser lag on updates
                            if (viewer.src && viewer.src.startsWith('blob:')) {
                                URL.revokeObjectURL(viewer.src);
                            }
                            
                            viewer.src = url; 
                        } else {
                            console.error("Three.js failed to export binary data.");
                        }
                        
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }, 
                    { binary: true } // Strictly the 3rd parameter 
                );

            }, 50); 
        }

        window.addEventListener('DOMContentLoaded', generateModel);
    </script>
</body>
</html>
